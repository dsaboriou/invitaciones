<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steph's 31st Birthday</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎉</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Barlow+Condensed:wght@700&display=swap');
    </style>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Confetti canvas -->
    <canvas id="confettiCanvas"></canvas>

    <div class="background-container"></div>

    <div class="player-container">
        <!-- Header -->
        <div class="header anim-fade-down">
            <i class="fas fa-chevron-down"></i>
            <span>PLAYING FROM PLAYLIST</span>
            <i class="fas fa-ellipsis-h"></i>
        </div>

        <!-- Album art -->
        <div class="album-art-container anim-fade-up" style="animation-delay:0.1s">
            <div class="album-art" id="albumArt">
                <img src="assets/foto.webp" alt="Steph's Birthday">
                <div class="album-overlay" id="albumOverlay">
                    <p>✨ Llevar actitud y lo de tomar ✨</p>
                </div>
            </div>
            <!-- Equalizer bars under album -->
            <div class="equalizer" id="equalizer">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>

        <!-- Track info -->
        <div class="track-info anim-fade-up" style="animation-delay:0.2s">
            <div class="text-info">
                <h1 class="track-title">Steph's 31st Birthday 🎂</h1>
                <p class="artist-name">Domingo 15 de Febrero • 1:00 PM</p>
            </div>
            <i class="far fa-heart heart-icon unliked" id="heartBtn"></i>
        </div>

        <!-- Location -->
        <div class="location-details anim-fade-up" style="animation-delay:0.3s">
            <p><i class="fas fa-map-marker-alt"></i> Condominio Montezuma</p>
            <a class="waze-btn" href="" target="_blank" rel="noopener">
                <img src="https://www.waze.com/favicon.ico" alt="Waze" class="waze-icon">
                Llegar con Waze
            </a>
        </div>

        <!-- Progress bar -->
        <div class="progress-bar-container anim-fade-up" style="animation-delay:0.4s">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" style="width: 0%"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="duration">-:--</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls anim-fade-up" style="animation-delay:0.5s">
            <i class="fas fa-random shuffle"></i>
            <i class="fas fa-step-backward prev"></i>
            <div class="play-pause-btn" id="playPauseBtn">
                <i class="fas fa-play" id="playIcon"></i>
                <i class="fas fa-pause" id="pauseIcon" style="display: none;"></i>
            </div>
            <i class="fas fa-step-forward next"></i>
            <i class="fas fa-redo-alt repeat"></i>
        </div>
    </div>

    <audio id="audioPlayer" src="assets/Cancion.mp3" loop></audio>

    <script>
        /* ── Audio player ── */
        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const progressFill = document.querySelector('.progress-fill');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const albumArt = document.getElementById('albumArt');
        const equalizer = document.getElementById('equalizer');

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        let isPlaying = false;

        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                albumArt.classList.add('playing');
                equalizer.classList.add('active');
                isPlaying = true;
                startConfetti();
            } else {
                audio.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                albumArt.classList.remove('playing');
                equalizer.classList.remove('active');
                isPlaying = false;
                stopConfetti();
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = pct + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        // Seek on progress bar click
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        });

        /* ── Heart button ── */
        const heartBtn = document.getElementById('heartBtn');
        let isLiked = false;

        heartBtn.addEventListener('click', () => {
            isLiked = !isLiked;
            heartBtn.classList.toggle('fa-heart', false);
            if (isLiked) {
                heartBtn.classList.replace('far', 'fas');
                heartBtn.classList.replace('unliked', 'liked');
                burstHearts();
            } else {
                heartBtn.classList.replace('fas', 'far');
                heartBtn.classList.replace('liked', 'unliked');
            }
            heartBtn.classList.add('fa-heart');
            heartBtn.classList.remove('pop');
            void heartBtn.offsetWidth;
            heartBtn.classList.add('pop');
        });

        /* ── Heart burst particles ── */
        function burstHearts() {
            const rect = heartBtn.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            for (let i = 0; i < 8; i++) {
                const el = document.createElement('span');
                el.className = 'heart-particle';
                el.textContent = '♥';
                el.style.left = cx + 'px';
                el.style.top = cy + 'px';
                const angle = (i / 8) * Math.PI * 2;
                const dist = 40 + Math.random() * 30;
                el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 700);
            }
        }

        /* ── Confetti ── */
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        let confettiPieces = [];
        let confettiRunning = false;
        let confettiRAF;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const COLORS = ['#1DB954', '#ff6b6b', '#ffd93d', '#6bcbff', '#ff9ff3', '#ffffff'];

        function spawnConfetti(n = 6) {
            for (let i = 0; i < n; i++) {
                confettiPieces.push({
                    x: Math.random() * canvas.width,
                    y: -10,
                    w: 6 + Math.random() * 8,
                    h: 10 + Math.random() * 6,
                    color: COLORS[Math.floor(Math.random() * COLORS.length)],
                    rot: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.15,
                    vx: (Math.random() - 0.5) * 2,
                    vy: 1.5 + Math.random() * 2.5,
                    opacity: 1
                });
            }
        }

        let spawnInterval;

        function startConfetti() {
            confettiRunning = true;
            spawnInterval = setInterval(() => spawnConfetti(5), 120);
            animateConfetti();
        }

        function stopConfetti() {
            clearInterval(spawnInterval);
            confettiRunning = false;
            // Let existing pieces fall out
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 20 && p.opacity > 0);

            confettiPieces.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.rot += p.rotSpeed;
                if (p.y > canvas.height * 0.75) p.opacity -= 0.015;

                ctx.save();
                ctx.globalAlpha = p.opacity;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            });

            if (confettiRunning || confettiPieces.length > 0) {
                confettiRAF = requestAnimationFrame(animateConfetti);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }
    </script>
</body>

</html>
